<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রাইভেট ভিউয়ার</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* স্ক্রলবার হাইড করার জন্য */
        }
        #wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .nav-bar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            display: flex;
            z-index: 999;
        }
        input { flex: 1; margin-right: 10px; padding: 5px; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <input type="text" id="targetUrl" placeholder="লিংক লিখুন (যেমন: wikipedia.org)">
        <button onclick="changeSite()">ভিজিট করুন</button>
    </div>

    <div id="wrapper">
        <iframe id="siteFrame" src="about:blank"></iframe>
    </div>

    <script>
        function changeSite() {
            let url = document.getElementById('targetUrl').value;
            if (!url.startsWith('http')) {
                url = 'https://' + url;
            }
            document.getElementById('siteFrame').src = url;
            
            // কন্ট্রোল বারটি হাইড করতে চাইলে নিচের লাইনটি আনকমেন্ট করুন
            // document.querySelector('.nav-bar').style.display = 'none';
        }
    </script>

</body>
</html>

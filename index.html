<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARIYAN PROJECT ZERO | NEXUS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');

        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --bg-dark: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%; height: 100%;
            background-color: var(--bg-dark);
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            color: white;
        }

        /* --- Quantum Background Canvas --- */
        #canvas-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; opacity: 0.6;
        }

        /* --- Futuristic Aperture Shutter (The Door) --- */
        .shutter {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 30%, #000 70%);
            display: flex; justify-content: center; align-items: center;
            z-index: 100; transition: transform 1.2s cubic-bezier(0.77, 0, 0.175, 1), opacity 1s;
        }

        .shutter-blade {
            position: absolute; width: 150%; height: 150%;
            background: #0a0a0a; border: 1px solid rgba(0, 242, 255, 0.1);
            clip-path: polygon(50% 50%, 100% 0, 100% 100%);
            transition: all 1.5s cubic-bezier(0.85, 0, 0.15, 1);
        }

        /* Blade orientations */
        .b1 { transform: rotate(0deg); }
        .b2 { transform: rotate(72deg); }
        .b3 { transform: rotate(144deg); }
        .b4 { transform: rotate(216deg); }
        .b5 { transform: rotate(288deg); }

        body.unlocked .shutter-blade { transform: rotate(90deg) scale(0); opacity: 0; }
        body.unlocked .shutter { pointer-events: none; opacity: 0; }

        /* --- Central Core UI --- */
        .core-container {
            position: relative; z-index: 110;
            display: flex; flex-direction: column; align-items: center;
            transition: opacity 0.8s, transform 0.8s;
        }

        .core-visual {
            width: 200px; height: 200px;
            border-radius: 50%;
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 30px var(--neon-blue), inset 0 0 30px var(--neon-blue);
            display: flex; justify-content: center; align-items: center;
            margin-bottom: 30px; position: relative;
            animation: pulse 2s infinite alternate;
        }

        .core-inner {
            width: 80%; height: 80%; border-radius: 50%;
            border: 2px dashed var(--neon-purple);
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { from { transform: scale(1); box-shadow: 0 0 20px var(--neon-blue); } to { transform: scale(1.05); box-shadow: 0 0 50px var(--neon-blue); } }

        .brand-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem; font-weight: 700;
            letter-spacing: 15px; text-transform: uppercase;
            background: linear-gradient(to right, #00f2ff, #bc13fe);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0,242,255,0.5));
        }

        /* --- Action Button --- */
        .btn-nexus {
            margin-top: 50px; padding: 15px 50px;
            background: transparent; border: 1px solid var(--neon-blue);
            color: var(--neon-blue); font-family: 'Orbitron';
            letter-spacing: 5px; cursor: pointer; position: relative;
            overflow: hidden; transition: 0.4s;
        }

        .btn-nexus:hover {
            background: var(--neon-blue); color: #000;
            box-shadow: 0 0 40px var(--neon-blue);
        }

        /* --- Iframe Content --- */
        #app-viewport {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            border: none; opacity: 0; transition: opacity 1.5s ease;
            z-index: 50;
        }
        body.unlocked #app-viewport { opacity: 1; }

        /* --- Mode Switcher Hub --- */
        #mode-hub {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) scale(0);
            z-index: 1000; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        body.unlocked #mode-hub { transform: translateX(-50%) scale(1); }

        .hub-btn {
            background: rgba(0, 0, 0, 0.8); border: 1px solid var(--neon-blue);
            color: var(--neon-blue); padding: 10px 25px; border-radius: 30px;
            font-family: 'Orbitron'; font-size: 0.8rem; cursor: pointer;
            backdrop-filter: blur(10px); box-shadow: 0 0 20px rgba(0,242,255,0.2);
        }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>

    <div class="shutter" id="main-shutter">
        <div class="shutter-blade b1"></div>
        <div class="shutter-blade b2"></div>
        <div class="shutter-blade b3"></div>
        <div class="shutter-blade b4"></div>
        <div class="shutter-blade b5"></div>

        <div class="core-container" id="intro-ui">
            <div class="core-visual">
                <div class="core-inner"></div>
                <div style="position:absolute; font-size: 0.7rem; color: var(--neon-blue);">STABLE</div>
            </div>
            <h1 class="brand-name">ARIYAN</h1>
            <p style="letter-spacing: 8px; color: #aaa;">PROJECT ZERO NEXUS</p>
            <button class="btn-nexus" onclick="bootstrap()">INITIALIZE</button>
        </div>
    </div>

    <iframe id="app-viewport" src=""></iframe>

    <div id="mode-hub">
        <button class="hub-btn" onclick="toggleDisplay()">SYSTEM: MOBILE</button>
    </div>

    <audio id="boot-sound">
        <source src="https://www.soundjay.com/buttons/beep-01a.mp3" type="audio/mpeg">
    </audio>

    <script>
        // --- Background Particles Animation ---
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = '#00f2ff';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function createParticles() {
            for (let i = 0; i < 100; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        initCanvas();
        createParticles();
        animate();
        window.addEventListener('resize', initCanvas);

        // --- Core Logic ---
        const iframe = document.getElementById('app-viewport');
        const hubBtn = document.querySelector('.hub-btn');
        let isDesktop = false;

        function bootstrap() {
            document.getElementById('boot-sound').play().catch(() => {});
            document.getElementById('intro-ui').style.opacity = '0';
            document.getElementById('intro-ui').style.transform = 'scale(0.8)';
            
            iframe.src = "https://galary-seven.vercel.app";
            
            setTimeout(() => {
                document.body.classList.add('unlocked');
            }, 500);
        }

        function toggleDisplay() {
            isDesktop = !isDesktop;
            if (isDesktop) {
                iframe.style.width = '1280px';
                iframe.style.height = (1280 * (window.innerHeight/window.innerWidth)) + 'px';
                const scale = window.innerWidth / 1280;
                iframe.style.transform = `scale(${scale})`;
                iframe.style.transformOrigin = 'top left';
                hubBtn.innerText = "SYSTEM: DESKTOP";
                hubBtn.style.borderColor = "#bc13fe";
                hubBtn.style.color = "#bc13fe";
            } else {
                iframe.style.width = '100%';
                iframe.style.height = '100%';
                iframe.style.transform = 'none';
                hubBtn.innerText = "SYSTEM: MOBILE";
                hubBtn.style.borderColor = "#00f2ff";
                hubBtn.style.color = "#00f2ff";
            }
        }
    </script>
</body>
</html>
